<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results - YHAGA Store</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="products/images/favicon-32x32.png">
    <script src="script.js" defer></script>
</head>
<body class="mod">
<header>
    <h1>Search Results</h1>
    <nav>
        <a href="new.html" class="nav-logo">
            <img src="products/images/CAT.png" alt="314 Logo">
        </a>
        
        <form id="search-form" action="search.html" method="get" class="desktop-search">
            <div class="search-wrapper">
                <img class="search-icon" src="products/images/magnifying-glass-9-svgrepo-com.svg" alt="Search">
                <input type="text" name="q" placeholder="Search" required>
            </div>
        </form>

        <div class="mobile-menu-header">
            <button class="menu-toggle" onclick="toggleMenu()">☰</button>
        </div>
        
        <a href="./index.html">Home</a>
        <a href="./cart.html" id="cart-link">
            <img id="cart-icon" src="products/images/shopping-cart-free-5-svgrepo-com.svg" alt="Cart">
            Cart <span id="cart-count">0</span>
        </a>
    </nav>
</header>

<div class="shop-layout">

    <div class="left-links">
        <div class="mobile-menu-header">
            <form id="mobile-search-form" action="search.html" method="get" class="desktop-search">
                <div class="search-wrapper">
                    <img class="search-icon" src="products/images/magnifying-glass-9-svgrepo-com.svg" alt="Search">
                    <input type="text" name="q" placeholder="Search" required>
                </div>
            </form>

            <button class="menu-close">✕</button>
        </div>

        <a href="new.html">New</a>
        <a href="tshirts.html">All T-Shirts</a>
        <a href="graphic_ts.html">Graphic T's</a>
        <a href="logo_ts.html">Logo T's</a>
        <a href="pants.html">Pants</a>
        <a href="shorts.html">Shorts</a>
        <a href="https://www.instagram.com/yhagacairo" target="_blank">
            <img src="products/images/black-instagram-icon.svg" alt="Instagram" class="mobile-social-icon">
        </a>
        <a href="index.html">Home</a>
        <a href="tos.html">Terms of Service</a>

        <p class="mobile-copyright">Copyright © 2026 YHAGA</p>
    </div>

    <div class="container" id="search-results">
        <button class="back-arrow" onclick="history.back()">
            <span class="arrow-icon"> < </span>
        </button>
        <span id="search-query-display"></span> <!-- ← this will show the search text -->
        <!-- JS will populate matching products here -->
    </div>
    
</div>

<script>
    const products = [
        { name: "Death Mask", price: 30.00, images: ["products/images/FINISH10.png", "products/images/FINISH-BlankWhiteBack.png"], link: "products/product1.html" },
        { name: "314", price: 30.00, images: [ "products/images/FINISH11.png", "products/images/FINISH-BlankBlackBack.png"], link: "products/product2.html" },
        { name: "CASH-White", price: 30.00, images: [ "products/images/FINISH5.png", "products/images/FINISH-BlankWhiteBack.png"], link: "products/product3.html" },
        { name: "CASH-Black", price: 30.00, images: [ "products/images/FINISH6.png", "products/images/FINISH6-2.png"], link: "products/product4.html" },
        { name: "One Pound", price: 30.00, images: [ "products/images/FINISH1.png", "products/images/FINISH1-2.png"], link: "products/product5.html" },
        { name: "Club", price: 30.00, images: [ "products/images/FINISH2.png", "products/images/FINISH-BlankWhiteBack.png"], link: "products/product6.html" },
        { name: "Chanel", price: 30.00, images: [ "products/images/FINISH3.png", "products/images/FINISH-BlankWhiteBack.png"], link: "products/product7.html" },
        { name: "One Pound - 2", price: 30.00, images: [ "products/images/FINISH4.png", "products/images/FINISH-BlankBlackBack.png"], link: "products/product8.html" },
        { name: "Satellite", price: 30.00, images: [ "products/images/FINISH8.png", "products/images/FINISH-BlankBlackBack.png"], link: "products/product9.html" },
        { name: "Death Mask - 2", price: 30.00, images: [ "products/images/FINISH9.png", "products/images/FINISH-BlankWhiteBack.png"], link: "products/product10.html" },
        { name: "YHAGA", price: 30.00, images: [ "products/images/FINISH-WF.png", "products/images/FINISH-BlankWhiteBack.png"], link: "products/product11.html" },
        { name: "YHAGA - 2", price: 30.00, images: [ "products/images/FINISH-BF.png", "products/images/FINISH-BlankBlackBack.png"], link: "products/product12.html" },
        { name: "YHAGA - 3", price: 30.00, images: [ "products/images/FINISH-WE2.png", "products/images/FINISH-BlankWhiteBack.png"], link: "products/product13.html" },
        { name: "YHAGA - 4", price: 30.00, images: [ "products/images/FINISH-BE2.png", "products/images/FINISH-BlankBlackBack.png"], link: "products/product14.html" },
        { name: "House", price: 30.00, images: [ "products/images/FINISH14.png", "products/images/FINISH-BlankWhiteBack.png"], link: "products/product15.html" },
        { name: "Abu Simbel", price: 30.00, images: [ "products/images/FINISH15.png", "products/images/FINISH-BlankWhiteBack.png"], link: "products/product16.html" },
        { name: "Supreme", price: 30.00, images: [ "products/images/FINISH16.png", "products/images/FINISH-BlankWhiteBack.png"], link: "products/product17.html" },
        { name: "Egyptian Eagle", price: 30.00, images: [ "products/images/FINISH17.png", "products/images/FINISH-BlankWhiteBack.png"], link: "products/product18.html" },
        { name: "YHAGA - 5", price: 30.00, images: [ "products/images/FINISH18.png", "products/images/FINISH-BlankWhiteBack.png"], link: "products/product19.html" },
        { name: "Boat", price: 30.00, images: [ "products/images/FINISH19.png", "products/images/FINISH19-2.png"], link: "products/product20.html" },
        { name: "Palestine X Egypt", price: 30.00, images: [ "products/images/FINISH20.png", "products/images/FINISH20-2.png"], link: "products/product21.html" },
        { name: "7 Stars", price: 30.00, images: [ "products/images/FINISH12.png", "products/images/FINISH12-2.png"], link: "products/product22.html" },
        { name: "7 Fruits", price: 30.00, images: [ "products/images/FINISH21.png", "products/images/FINISH-BlankWhiteBack.png"], link: "products/product23.html" },
        { name: "Houses", price: 30.00, images: [ "products/images/FINISH22.png", "products/images/FINISH22-2.png"], link: "products/product24.html" },
        { name: "Aubameyang", price: 30.00, images: [ "products/images/FINISH23.png", "products/images/FINISH-BlankWhiteBack.png"], link: "products/product25.html" },
    ];

    // Get search query from URL
    const params = new URLSearchParams(window.location.search);
    const query = params.get("q")?.toLowerCase() || "";
    
    const searchDisplay = document.getElementById("search-query-display");
    if (query) {
        searchDisplay.textContent = `"${query}"`;
    } else {
        searchDisplay.textContent = "All Products";
    }

    const resultsContainer = document.getElementById("search-results");

    // Filter products  
    const matches = products.filter(p => p.name.toLowerCase().includes(query));

    if (matches.length === 0) {
        resultsContainer.innerHTML = "<p>No products found.</p>";
    } else {
        matches.forEach(p => {
            const div = document.createElement("div");
            div.className = "product";
            div.setAttribute("data-name", p.name);
            div.setAttribute("data-price", p.price.toFixed(2));
            div.setAttribute("data-image", p.image);
            div.setAttribute("data-category", "tshirt"); // or dynamic if you have category

            div.innerHTML = `
                <a href="${p.link}">
                    <img src="${p.images[0]}" alt="${p.name}" width="200">
                    <img class="hover-img" src="${p.images[1] || p.images[0]}" alt="${p.name} Hover">
                    <h3>${p.name}</h3>
                </a>
                <p>€${p.price.toFixed(2)}</p>
            `;
            resultsContainer.appendChild(div);
        });
        const totalProducts = resultsContainer.querySelectorAll('.product').length;
        const perRow = window.innerWidth <= 768 ? 2 : 3;
        const rows = Math.ceil(totalProducts / perRow);
        resultsContainer.style.setProperty('--rows', rows);
    }
</script>
</body>
</html>
