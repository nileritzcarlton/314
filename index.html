<!DOCTYPE html>
<html lang="en">

<head>
<meta property="og:image" content="https://yhaga.com/products/images/CAT-Background-2.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YHAGA Store</title>

<link rel="stylesheet" href="styles.css">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="products/images/favicon-32x32.png">
<meta name="theme-color" content="#000000">

<script src="script.js" defer></script>
</head>

<body>

<div id="welcome-screen">
    <div class="tv-wrapper">

        <div class="tv-screen">
            <div class="welcome-content">
                <div id="enter-text">
                    <span class="blink">></span> Enter the store
                </div>
            </div>
        </div>

        <img src="products/images/old-tv-11527929226fejsvwoyk3x.png" class="tv-frame">

    </div>
</div>


<div id="open-browser-banner">
⚠️ For the best experience, open this page in your browser.
<br>
<button onclick="openBrowser()">Open in Browser</button>
</div>


<script>

function isInstagramBrowser() {
    const ua = navigator.userAgent || navigator.vendor || window.opera;
    return ua.includes("Instagram");
}

function openBrowser() {
    window.location.href = window.location.href;
}

if (isInstagramBrowser()) {
    document.getElementById("open-browser-banner").style.display = "block";
}


// ENTER STORE click
document.getElementById("enter-text").addEventListener("click", () => {
    window.location.href = "new.html";
});

// ENTER key support
document.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
        window.location.href = "new.html";
    }
});

</script>

</body>
</html>
