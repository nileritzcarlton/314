<!DOCTYPE html>
<html lang="en" class="index">
<head>
    <meta property="og:image" content="https://yhaga.com/products/images/CAT-Background-2.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YHAGA Store</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="products/images/favicon-32x32.png">
    <meta name="theme-color" content="#000000">
    <script src="script.js" defer></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-X68DQ4NPVR"></script>
    <script src="./analytics.js"></script>
</head>

<div id="welcome-screen">
    <div class="tv-wrapper">
        <!-- Background image inside the TV screen -->
        <div class="tv-screen">
            <div class="shutter top"></div>
            <div class="shutter bottom"></div>

            <div class="crt-flare"></div>

            <div class="welcome-content">
                <div id="enter-text">
                    <span class="arrow blink">></span>
                    <span class="text">Enter the store</span>
                </div>
            </div>
        </div>

        <!-- The TV image on top -->
        <picture>
            <source srcset="products/images/old-tv-2@3x-pink.png" media="(max-width: 768px)">
            <img src="products/images/old-tv@3x-pink.png" class="tv-frame">
            </picture>
    </div>
</div>

<body>
    <script> 
        document.addEventListener("DOMContentLoaded", () => {
            const enter = document.getElementById("enter-text");
            const tvScreen = document.querySelector(".tv-screen");

            if (!enter || !tvScreen) return; // prevent errors on other pages

            function closeTV() {
                tvScreen.classList.add("close");

                setTimeout(() => {
                    window.location.href = "new.html";
                }, 800);
            }

            enter.addEventListener("click", closeTV);

            document.addEventListener("keydown", (e) => {
                if (e.key === "Enter") {
                    closeTV();
                }
            });
        });
    </script>
</body>

</html>
